workflows:
  ios-build:
    name: Agent Fit iOS
    max_build_duration: 60
    environment:
      xcode: latest
      node: "22"
      vars:
        VITE_API_URL: https://agent-fit-production.up.railway.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install
      - name: Build Vite app (bakes VITE_API_URL into bundle)
        script: |
          cd frontend
          npm run build
      - name: Add Capacitor iOS platform (skip if already exists)
        script: |
          cd frontend
          npx cap add ios 2>/dev/null || echo "iOS platform already exists"
      - name: Sync Capacitor with built web assets
        script: |
          cd frontend
          npx cap sync ios
      - name: Set bundle identifier
        script: |
          cd frontend/ios/App
          xcrun agvtool new-version -all 1
      - name: Build iOS archive
        script: |
          cd frontend/ios/App
          xcodebuild \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Export IPA (unsigned)
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd frontend/ios/App
          # Package the app payload into an unsigned IPA for AltStore re-signing
          mkdir -p /tmp/Payload
          APP_PATH=$(find $CM_BUILD_DIR/App.xcarchive/Products -name "*.app" | head -1)
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp && zip -r $CM_BUILD_DIR/ipa/AgentFit.ipa Payload
          echo "IPA created at $CM_BUILD_DIR/ipa/AgentFit.ipa"
    artifacts:
      - $CM_BUILD_DIR/App.xcarchive
      - $CM_BUILD_DIR/ipa/*.ipa
